<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DONATUR AL FALAH</title>
    <link rel="icon" href="https://upload.wikimedia.org/wikipedia/commons/thumb/a/a3/Lambang-kabupaten-jember.png/500px-Lambang-kabupaten-jember.png" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background-color: #ffffff;
        }
        .iframe-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            z-index: 1;
        }
        /* Loader di belakang iframe */
        .loader {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
            text-align: center;
        }
        .loader img {
            width: 80px;
            margin-bottom: 15px;
            border-radius: 50%;
        }
    </style>
</head>
<body>

    <div class="loader">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/a/a3/Lambang-kabupaten-jember.png/500px-Lambang-kabupaten-jember.png" alt="Logo Al Falah">
        <div class="d-flex justify-content-center">
            <div class="spinner-border text-success" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
        </div>
        <p class="mt-2 text-muted" style="font-weight: 500;">Menghubungkan ke Server...</p>
    </div>

    <iframe 
        src="https://script.google.com/macros/s/AKfycbxhGsGjCecnh7a0y-h_rXLblm6RVnhU5-78OsriTTd-dvZ3R3fO4dzt3EAF73XjAzzAjQ/exec" 
        class="iframe-container"
        allow="geolocation; microphone; camera">
    </iframe>

</body>

</html>
